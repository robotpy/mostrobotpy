extra_includes:
- rpy/AddressableLEDBuffer.h

classes:
  frc::LEDPattern:
    enums:
      GradientType:
    methods:
      "Off":
      LEDPattern:
      ApplyTo:
        overloads:
          std::span<frc::AddressableLED::LEDData> [const]:
          LEDReader, std::function<void (int, frc::Color)> [const]:
          std::span<frc::AddressableLED::LEDData>, std::function<void (int, frc::Color)> [const]:
      Reversed:
      OffsetBy:
      ScrollAtRelativeSpeed:
      ScrollAtAbsoluteSpeed:
      Blink:
        overloads:
          units::second_t, units::second_t:
          units::second_t:
      SynchronizedBlink:
      Breathe:
      OverlayOn:
      Blend:
      Mask:
      AtBrightness:
      Solid:
      ProgressMaskLayer:
      Steps:
        overloads:
          std::span<const std::pair<double, Color>>:
          std::initializer_list<std::pair<double, Color>>:
            ignore: true
      Gradient:
        overloads:
          GradientType, std::span<const Color>:
          GradientType, std::initializer_list<Color>:
            ignore: true
      Rainbow:
      MapIndex:
    inline_code: |
      .def("applyTo", [](const frc::LEDPattern& self, frc::AddressableLEDBuffer& data) {
        self.ApplyTo(static_cast<std::span<frc::AddressableLED::LEDData>>(data));
      }, py::arg("data"), release_gil(), py::prepend())
      .def("applyTo", [](const frc::LEDPattern& self, frc::AddressableLEDBuffer& data,
                         std::function<void (int, frc::Color)> writer) {
        self.ApplyTo(static_cast<std::span<frc::AddressableLED::LEDData>>(data), std::move(writer));
      }, py::arg("data"), py::arg("writer").none(false), release_gil(), py::prepend())
      .def("applyTo", [](const frc::LEDPattern& self, frc::AddressableLEDBuffer::View& data) {
        self.ApplyTo(static_cast<std::span<frc::AddressableLED::LEDData>>(data));
      }, py::arg("data"), release_gil(), py::prepend())
      .def("applyTo", [](const frc::LEDPattern& self, frc::AddressableLEDBuffer::View& data,
                         std::function<void (int, frc::Color)> writer) {
        self.ApplyTo(static_cast<std::span<frc::AddressableLED::LEDData>>(data), std::move(writer));
      }, py::arg("data"), py::arg("writer").none(false), release_gil(), py::prepend())
  frc::LEDPattern::LEDReader:
    methods:
      LEDReader:
      size:
