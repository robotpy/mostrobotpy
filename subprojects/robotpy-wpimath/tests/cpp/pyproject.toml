[build-system]
build-backend = "hatchling.build"
requires = [
    "semiwrap", "hatch-meson", "hatchling",
]

[project]
name = "wpimath_test"
version = "0.1"
description = "Test project for verifying robotpy-build behavior"
requires-python = ">=3.11"
authors = [
    {name = "RobotPy Development Team", email = "robotpy@googlegroups.com"},
]
license = "BSD-3-Clause"

[tool.hatch.build.hooks.semiwrap]
[tool.hatch.build.hooks.meson]

[tool.semiwrap]
update_init = [
    "wpimath_test wpimath_test._wpimath_test",
]
name_transform.default = "snake_case"
name_transform.enum_value = "CAPS_CASE"
name_transform.acronyms = ["mDNS", "DS", "CAN", "PWM", "I2C", "SPI", "NT", "JSON", "PID", "IMU", "HAL", "JNI", "USB", "HTTP", "URI", "URL", "CPU", "FPGA", "FMS", "PCM", "PDP", "PDH", "RIO"]

[tool.semiwrap.extension_modules."wpimath_test._wpimath_test"]
name = "wpimath_test"
depends = ["wpimath"]
includes = ["wpimath_test/include"]

[tool.semiwrap.extension_modules."wpimath_test._wpimath_test".headers]
module = "module.h"
