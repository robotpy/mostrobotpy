[build-system]
build-backend = "hatchling.build"
requires = [
    "semiwrap~=0.3.0",
    "hatch-meson~=0.1.2",
    "hatch-robotpy~=0.2.1",
    "hatchling",
    "robotpy-native-xrp==2027.0.0a6",
    "wpilib==2027.0.0a6.post1",
]


[project]
name = "robotpy-xrp"
version = "2027.0.0a6.post1"
description = "Binary wrapper for WPILib XRP Vendor library"
requires-python = ">=3.11"
authors = [
    {name = "RobotPy Development Team", email = "robotpy@googlegroups.com"},
]
license = "BSD-3-Clause"
dependencies = [
    "robotpy-native-xrp==2027.0.0a6",
    "wpilib==2027.0.0a6.post1"
]

[project.entry-points."robotpy_cli.2027"]
run-xrp = "xrp.cli:RunXrp"

[project.entry-points."robotpy_sim.2027"]
xrp = "xrp.extension"


[tool.hatch.build.hooks.robotpy]
version_file = "xrp/version.py"

[[tool.hatch.build.hooks.robotpy.maven_lib_download]]
artifact_id = "halsim_xrp"
group_id = "org.wpilib.halsim"
repo_url = "https://frcmaven.wpi.edu/artifactory/development-2027"
version = "2027.0.0-alpha-6-121-g54b023998"
use_headers = false

extract_to = "xrp/extension"
libs = ["halsim_xrp"]

[tool.hatch.build.hooks.semiwrap]

[tool.hatch.build.hooks.meson]

[tool.hatch.build.targets.wheel]
packages = ["xrp"]


[tool.semiwrap]
update_init = ["xrp"]
name_transform.default = "snake_case"
name_transform.enum_value = "CAPS_CASE"
name_transform.acronyms = ["mDNS", "DS", "CAN", "PWM", "I2C", "SPI", "NT", "JSON", "PID", "IMU", "HAL", "JNI", "USB", "HTTP", "URI", "URL", "CPU", "FPGA", "FMS", "PCM", "PDP", "PDH", "RIO", "OpMode"]

[tool.semiwrap.extension_modules."xrp._xrp"]
name = "xrp"
wraps = ["robotpy-native-xrp"]
depends = ["wpilib", "wpimath"]

[tool.semiwrap.extension_modules."xrp._xrp".headers]
# wpi/xrp
XRPGyro = "wpi/xrp/XRPGyro.hpp"
XRPMotor = "wpi/xrp/XRPMotor.hpp"
XRPOnBoardIO = "wpi/xrp/XRPOnBoardIO.hpp"
XRPRangefinder = "wpi/xrp/XRPRangefinder.hpp"
XRPReflectanceSensor = "wpi/xrp/XRPReflectanceSensor.hpp"
XRPServo = "wpi/xrp/XRPServo.hpp"
