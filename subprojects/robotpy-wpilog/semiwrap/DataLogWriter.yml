classes:
  wpi::log::DataLogWriter:
    inline_code: |
      .def("__enter__", [](DataLogWriter *self) {
        return self;
      })
      .def("__exit__", [](DataLogWriter &self, py::args args) {
        py::gil_scoped_release release;
        self.Stop();
      })
    methods:
      DataLogWriter:
        overloads:
          std::string_view, std::error_code&, std::string_view:
            cpp_code: |
              [](std::string_view filename, std::string_view extraHeader) {
                std::error_code ec;
                auto writer = std::make_unique<DataLogWriter>(filename, ec, extraHeader);
                if (ec) {
                  throw std::system_error(ec);
                }
                return writer;
              }
            param_override:
              ec:
                ignore: true
          wpi::util::Logger&, std::string_view, std::error_code&, std::string_view:
            ignore: true
          std::unique_ptr<wpi::util::raw_ostream>, std::string_view:
            ignore: true
          wpi::util::Logger&, std::unique_ptr<wpi::util::raw_ostream>, std::string_view:
            ignore: true
      Flush:
      Stop:
      GetStream:
        ignore: true
