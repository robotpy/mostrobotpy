[build-system]
build-backend = "hatchling.build"
requires = [
    "semiwrap~=0.3.0",
    "hatch-meson~=0.1.2",
    "hatchling",
    "robotpy-native-datalog==2027.0.0a6",
    "robotpy-wpiutil==2027.0.0a6.post1"
]

[project]
name = "robotpy-wpilog"
version = "2027.0.0a6.post1"
description = "Binary wrapper for WPILib logging library"
requires-python = ">=3.11"
authors = [
    {name = "RobotPy Development Team", email = "robotpy@googlegroups.com"},
]
license = "BSD-3-Clause"
dependencies = [
    "robotpy-native-datalog==2027.0.0a6",
    "robotpy-wpiutil==2027.0.0a6.post1"
]

[project.urls]
"Source code" = "https://github.com/robotpy/mostrobotpy"


[tool.hatch.build.hooks.robotpy]
version_file = "wpilog/version.py"

[tool.hatch.build.hooks.semiwrap]

[tool.hatch.build.hooks.meson]

[tool.hatch.build.targets.wheel]
packages = ["wpilog"]


[tool.semiwrap]
update_init = [
    "wpilog"
]
scan_headers_ignore = [
    # wpi/datalog
    "wpi/datalog/DataLog.h",
    "wpi/datalog/DataLogReaderThread.hpp",
    "wpi/datalog/FileLogger.hpp",
]
name_transform.default = "snake_case"
name_transform.enum_value = "CAPS_CASE"
name_transform.acronyms = ["mDNS", "DS", "CAN", "PWM", "I2C", "SPI", "NT", "JSON", "PID", "IMU", "HAL", "JNI", "USB", "HTTP", "URI", "URL", "CPU", "FPGA", "FMS", "PCM", "PDP", "PDH", "RIO"]

[tool.semiwrap.extension_modules."wpilog._wpilog"]
name = "wpilog"
wraps = ["robotpy-native-datalog"]
depends = ["wpiutil"]

[tool.semiwrap.extension_modules."wpilog._wpilog".headers]
# wpi/datalog
DataLog = "wpi/datalog/DataLog.hpp"
DataLogBackgroundWriter = "wpi/datalog/DataLogBackgroundWriter.hpp"
DataLogReader = "wpi/datalog/DataLogReader.hpp"
# DataLogReaderThread = "wpi/datalog/DataLogReaderThread.hpp"
DataLogWriter = "wpi/datalog/DataLogWriter.hpp"
# DataLog_c = "wpi/datalog/DataLog.h"
# FileLogger = "wpi/datalog/FileLogger.hpp"
